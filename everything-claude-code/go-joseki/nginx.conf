# Nginx configuration for Go Joseki Learning App
# Place this file in /etc/nginx/sites-available/ and link to sites-enabled

server {
    listen 80;
    server_name _;  # Replace with your domain name

    # Redirect HTTP to HTTPS (optional, uncomment if you have SSL)
    # return 301 https://$server_name$request_uri;

    root /var/www/go-joseki/dist;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # HTML files - no cache for SPA routing
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Single Page Application - redirect all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle 404 errors gracefully
    error_page 404 /index.html;
}

